baseURL = "https://zhongyi.github.io/"
title = "Zhongyi Ni"
theme = "LoveIt"
languageCode = "en"
defaultContentLanguage = "en"
hasCJKLanguage = false
enableRobotsTXT = true
enableEmoji = true

[module]
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
  [[module.mounts]]
    source = "cv"
    target = "static/cv"

[pagination]
  pagerSize = 10

[params]
  defaultTheme = "auto"
  dateFormat = "2006-01-02"
  title = "Zhongyi Ni"
  description = "Researcher in AI for science, quantum error correction, and computational physics."

  [params.author]
    name = "Zhongyi Ni"
    email = ""
    link = ""

  [params.app]
    title = "Zhongyi Ni"
    themeColor = "#ffffff"
    iconColor = "#5bbad5"
    tileColor = "#da532c"

  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"

    [params.header.title]
      name = "Zhongyi Ni"
      pre = ""
      post = ""
      typeit = false

  [params.footer]
    enable = true
    hugo = false
    copyright = true
    author = true
    since = 2026

  [params.home]
    rss = 10

    [params.home.profile]
      enable = false
      avatarURL = ""
      title = ""
      subtitle = ""
      typeit = false
      social = true
      disclaimer = ""

    [params.home.posts]
      enable = false
      paginate = 6

  [params.social]
    GitHub = ""
    Email = ""
    Googlescholar = ""
    Researchgate = ""
    ORCID = ""

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "#about"
    weight = 1
  [[menu.main]]
    identifier = "research"
    name = "Research"
    url = "#research"
    weight = 2
  [[menu.main]]
    identifier = "publications"
    name = "Publications"
    url = "#publications"
    weight = 3
  [[menu.main]]
    identifier = "software-talks"
    name = "Software & Talks"
    url = "#software-talks"
    weight = 4
  [[menu.main]]
    identifier = "experience"
    name = "Experience"
    url = "#experience"
    weight = 5
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "#contact"
    weight = 6

[outputs]
  home = ["HTML", "JSON"]
